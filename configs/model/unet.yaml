# @package _global_

model:
  _target_: starter_kit.baselines.unet.UnetModel
  n_epochs: ${n_epochs}
  learning_rate: ${learning_rate}
  weight_decay: 0.
  best_threshold: 0.99
  log_csv: true

network:
  _target_: starter_kit.baselines.unet.Unet
  num_classes: 0
  in_channels: 30
  out_channels: 1
  dim: 32
  dim_mults: [1, 2, 2, 2]
  resnet_block_groups: 8
  attn_dim_head: 64
  attn_heads: 4
  init_groups: 1
